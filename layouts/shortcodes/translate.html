<div id="google_translate_element" style="margin: 1rem 0; padding: 0.5rem; background: #f5f5f5; border-radius: 6px; display: inline-block;"></div>

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'ar,en',
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
    autoDisplay: false
  }, 'google_translate_element');
}
</script>

<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
/* Hide Google Translate banner */
.goog-te-banner-frame.skiptranslate {
  display: none !important;
}

/* Remove top padding added by Google Translate */
body {
  top: 0px !important;
}

/* Style the translate dropdown */
#google_translate_element select {
  background: white;
  border: 2px solid #228B22;
  border-radius: 4px;
  padding: 0.5rem;
  font-size: 0.9rem;
  color: #228B22;
  cursor: pointer;
}

#google_translate_element select:hover {
  border-color: #1a6b1a;
}

/* Hide the "Powered by" text */
.goog-logo-link {
  display: none !important;
}

.goog-te-gadget {
  color: transparent !important;
}

.goog-te-gadget .goog-te-combo {
  margin: 0 !important;
}
</style>
